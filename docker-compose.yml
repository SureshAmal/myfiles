version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: myfiles-minio
    environment:
      - MINIO_ROOT_USER=myfilesadmin
      - MINIO_ROOT_PASSWORD=myfilespassword123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  minio_data:
